version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      container_name: APP-AUDITS-API
      ports:
        - "8050:8000"

    restart: unless-stopped
  
  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  llm:
    image: ollama/ollama
    ports:
      - "11434:11434"
